server:
  port: 8080
  servlet:
    context-path: /
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  application:
    name: cc-survey-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # 数据源配置
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:cc_survey_db}?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 30000
      max-lifetime: 1800000
      connection-timeout: 30000
      pool-name: CcSurveyHikariPool

  # Redis配置
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 10000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
          max-wait: 3000ms

  # RabbitMQ配置
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: /
    listener:
      simple:
        acknowledge-mode: auto
        prefetch: 10
        retry:
          enabled: true
          initial-interval: 1000ms
          multiplier: 2
          max-attempts: 3
          max-interval: 10000ms

  # 邮件配置
  mail:
    host: ${MAIL_HOST:smtp.example.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
    default-encoding: UTF-8

  # 文件上传配置
  servlet:
    multipart:
      enabled: true
      max-file-size: 20MB
      max-request-size: 50MB
      file-size-threshold: 2KB

  # Jackson配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

  # 缓存配置
  cache:
    type: redis
    redis:
      time-to-live: 1800000  # 30分钟

# MyBatis-Plus配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: assign_uuid
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath*:/mapper/**/*.xml

# JWT配置
jwt:
  secret: ${JWT_SECRET}
  issuer: cc-survey
  expiration: 7200000      # 2小时
  refresh-expiration: 604800000  # 7天
  cookie-name: cc_survey_token
  cookie-max-age: 7200     # 2小时

# 文件存储配置
file:
  upload-dir: ${FILE_UPLOAD_DIR:./uploads}
  temp-dir: ${FILE_TEMP_DIR:./temp}
  allowed-types: image/jpeg,image/png,image/gif,image/webp,application/pdf,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet,application/vnd.openxmlformats-officedocument.wordprocessingml.document,text/plain
  max-size: 20971520  # 20MB

# 登录安全配置
login:
  max-fail-count: 5
  lock-duration: 1800  # 30分钟
  rate-limit:
    enabled: true
    requests-per-minute: 60

# CORS配置
cors:
  allowed-origins: http://localhost:5173,http://localhost:3000,http://127.0.0.1:5173
  allowed-methods: GET,POST,PUT,DELETE,OPTIONS
  allowed-headers: "*"
  allow-credentials: true
  max-age: 3600

# Actuator配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

# 日志配置
logging:
  level:
    root: INFO
    com.ccsurvey: DEBUG
    org.springframework.security: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/cc-survey.log

# 测试模式配置 (仅用于测试环境)
test:
  enabled: false
  mock-email: true

# Agent 配置
agent:
  llm:
    provider: ${LLM_PROVIDER:xfyun}
    xfyun:
      base-url: https://maas-coding-api.cn-huabei-1.xf-yun.com/v2
      api-key: ${XFYUN_API_KEY:}
      model: astron-code-latest
      temperature: 0.7
      max-tokens: 4096
    deepseek:
      base-url: https://api.deepseek.com/v1
      api-key: ${DEEPSEEK_API_KEY:}
      model: deepseek-chat
      temperature: 0.7
      max-tokens: 4096
    aliyun:
      base-url: https://dashscope.aliyuncs.com/api/v1
      api-key: ${ALIYUN_API_KEY:}
      model: qwen-plus
      temperature: 0.7
      max-tokens: 4096

  # 记忆配置
  memory:
    short-term:
      enabled: true
      window-size: 20
      ttl-minutes: 30
    long-term:
      enabled: true
      summarize-threshold: 50

  # 意图识别配置
  intent:
    classifier: hybrid  # rule, llm, hybrid
    confidence-threshold: 0.7

  # 编排配置
  orchestration:
    max-iterations: 5
    timeout-seconds: 60
    parallel-execution: true
